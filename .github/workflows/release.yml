name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-12 g++-12

      - name: Configure release
        run: cmake --preset release -DCMAKE_PROJECT_VERSION=${{ steps.version.outputs.VERSION }}
        env:
          CC:  gcc-12
          CXX: g++-12

      - name: Build
        run: cmake --build build/release --parallel

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

      - name: Package (CPack)
        run: cpack --config build/release/CPackConfig.cmake -G TGZ

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
