name: Build

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-24.04
            compiler: clang-17
            cc: clang-17
            cxx: clang++-17
          - os: macos-14
            compiler: clang
            cc: clang
            cxx: clang++

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build build/debug --parallel

      - name: Upload compile_commands.json
        uses: actions/upload-artifact@v4
        with:
          name: compile_commands-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/debug/compile_commands.json
          if-no-files-found: ignore
