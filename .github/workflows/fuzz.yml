name: Fuzzing

on:
  schedule:
    - cron: "0 3 * * 1"   # Weekly on Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: Fuzz duration per target (seconds)
        default: "60"

jobs:
  fuzz:
    name: LibFuzzer
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 clang++-17 ninja-build

      - name: Configure fuzz preset
        run: |
          cmake --preset fuzz
        env:
          CC:  clang-17
          CXX: clang++-17

      - name: Build fuzz targets
        run: cmake --build build/fuzz --parallel

      - name: Run fuzz targets
        run: |
          DURATION="${{ github.event.inputs.duration || '60' }}"
          bash scripts/fuzzing/run_fuzz.sh "$DURATION"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            artifacts/
            crash-*
            oom-*
            timeout-*
